name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"
      - name: Tests
        run: python -m pytest -q
      - name: Python syntax
        run: python -m compileall -q src tests scripts run.py
      - name: JavaScript syntax
        run: node --check src/ui/static/js/app.js && node --check src/ui/static/js/chat.js
      - name: CLI smoke
        run: mao --version && mao --help && mao-ui --help
      - name: Diff hygiene
        run: git diff --check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Dependency audit
        run: python -m pip install pip-audit && python -m pip_audit -r requirements.txt
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
