name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Force bash on all runners so Windows and Ubuntu share the same step syntax.
defaults:
  run:
    shell: bash

# Stable terminal width for Rich/Typer help rendering in pytest and CLI smoke.
# UTF-8 stdout avoids Windows cp1252/GBK failures on Chinese CLI help text.
env:
  COLUMNS: "160"
  TERM: xterm-256color
  NO_COLOR: "1"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" build wheel "setuptools>=77"
      # Private runtime configs are gitignored; seed examples so fresh clones
      # and CI match a first-time contributor checkout.
      - name: Seed example configs
        run: |
          test -f config/providers.yaml || cp config/providers.yaml.example config/providers.yaml
          test -f config/workers.yaml || cp config/workers.yaml.example config/workers.yaml
      - name: Tests
        run: python -m pytest -q
      - name: Offline smart-mining stability gate
        run: python scripts/replay_smart_mining.py
      - name: Offline layered-context benchmark
        run: python scripts/bench_compaction.py
      - name: Python syntax
        run: python -m compileall -q src tests scripts run.py
      - name: JavaScript syntax
        run: |
          node --check src/ui/static/js/app.js
          node --check src/ui/static/js/chat.js
      - name: CLI smoke
        run: |
          mao --version
          mao --help
          mao-ui --help
      - name: Distribution and clean first-use acceptance
        run: python scripts/verify_distribution.py
      - name: Diff hygiene
        run: git diff --check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Dependency audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python -m pip_audit -r requirements.txt
      # Use the free open-source binary. gitleaks-action requires a paid
      # license on private repositories, which blocks pre-public beta CI.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.24.3"
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          checksums="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" -o "${archive}"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${checksums}" -o "${checksums}"
          grep " ${archive}$" "${checksums}" | sha256sum -c -
          tar -xzf "${archive}" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Secret scan
        run: gitleaks git --verbose --redact .
