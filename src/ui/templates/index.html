<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAO - 模型连接配置</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>Multi-Agent Orchestrator — 模型连接配置</h1>
    <p class="subtitle">添加 Provider → 测试连接 → 选择主模型</p>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Provider 列表</h2>
        <button id="btn-add-provider" class="btn btn-primary" type="button">➕ 添加</button>
      </div>
      <ul id="provider-list" class="provider-list"></ul>

      <div class="model-pool">
        <h2>模型池</h2>
        <div id="model-pool" class="model-pool-tags"></div>
        <label class="main-model-row">
          <span>主模型</span>
          <select id="main-model-select"></select>
          <button id="btn-save-main" class="btn" type="button">保存主模型</button>
        </label>
      </div>
    </aside>

    <section class="detail-panel">
      <form id="provider-form" class="provider-form">
        <h2 id="form-title">添加 Provider</h2>

        <label>
          <span>预设模板</span>
          <select id="preset-select" name="preset_key"></select>
        </label>

        <div class="form-row">
          <label>
            <span>Provider 名称 *</span>
            <input id="provider-name" name="provider_name" type="text" placeholder="如 kimi" required>
          </label>
          <label>
            <span>显示名称 *</span>
            <input id="display-name" name="display_name" type="text" placeholder="如 Kimi 转发" required>
          </label>
        </div>

        <label>
          <span>Base URL *</span>
          <input id="base-url" name="base_url" type="url" placeholder="https://api.example.com/v1" required>
        </label>

        <label>
          <span>API Key *</span>
          <input id="api-key" name="api_key" type="password" placeholder="sk-..." required>
          <small>仅保存到本地 .env，不会被记录到日志。</small>
        </label>

        <label>
          <span>超时时间（秒）</span>
          <input id="timeout" name="timeout" type="number" min="5" value="120" required>
        </label>

        <div class="models-section">
          <div class="models-header">
            <h3>模型映射</h3>
            <button id="btn-add-model" class="btn" type="button">➕ 添加模型</button>
          </div>
          <table class="model-table">
            <thead>
              <tr>
                <th>逻辑别名</th>
                <th>上游 model_id</th>
                <th>输入价格 / 1M</th>
                <th>输出价格 / 1M</th>
                <th>能力标签</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="model-rows"></tbody>
          </table>
        </div>

        <label class="checkbox-row">
          <input id="set-as-main" name="set_as_main" type="checkbox">
          <span>保存后设为当前主模型</span>
        </label>

        <div class="form-actions">
          <button id="btn-test" class="btn btn-secondary" type="button">🧪 测试连接</button>
          <button id="btn-save" class="btn btn-primary" type="submit">💾 保存</button>
          <button id="btn-delete" class="btn btn-danger" type="button" disabled>🗑️ 删除</button>
        </div>

        <div id="test-result" class="test-result hidden"></div>
      </form>
    </section>
  </main>

  <script src="/static/js/app.js"></script>

  <footer class="app-footer">
    Multi-Agent Orchestrator · 本地运行 · API Key 仅保存在本地 .env
  </footer>
</body>
</html>
